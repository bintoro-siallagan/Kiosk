<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3d3d"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg3)"/>
  <!-- Coin pattern -->
  <g opacity="0.06">
    <circle cx="300" cy="300" r="80" fill="#F59E0B"/>
    <circle cx="1600" cy="800" r="120" fill="#34D399"/>
    <circle cx="1750" cy="250" r="60" fill="#F59E0B"/>
    <circle cx="250" cy="850" r="100" fill="#34D399"/>
  </g>
  <!-- Gift icon -->
  <text x="960" y="320" text-anchor="middle" font-size="160">🎁</text>
  <!-- Headline -->
  <text x="960" y="510" text-anchor="middle" font-family="Impact, sans-serif" font-size="140" font-weight="900" fill="url(#emerald)" letter-spacing="6">DAFTAR MEMBER</text>
  <text x="960" y="580" text-anchor="middle" font-family="Impact, sans-serif" font-size="140" font-weight="900" fill="#F59E0B" letter-spacing="6">DAPAT POIN</text>
  <!-- Bullet rewards -->
  <g transform="translate(960,690)" text-anchor="middle" font-family="Arial, sans-serif" fill="#fff" font-size="28">
    <text y="0">💰 Setiap Rp 1.000 = 1 poin</text>
    <text y="50">🎁 Tukar 100 poin = Diskon Rp 1.000</text>
    <text y="100">⭐ Tier VIP setelah 10 kunjungan</text>
  </g>
  <text x="960" y="980" text-anchor="middle" font-family="Impact, sans-serif" font-size="44" fill="#fff" letter-spacing="6">👆 PESAN &amp; DAFTAR SEKARANG</text>
</svg>
