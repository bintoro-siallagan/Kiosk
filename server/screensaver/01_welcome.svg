<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="orange1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg1)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="120" fill="#F59E0B" opacity="0.05"/>
  <circle cx="1700" cy="900" r="180" fill="#F97316" opacity="0.08"/>
  <circle cx="1750" cy="180" r="80" fill="#FB923C" opacity="0.06"/>
  <!-- Plate icon -->
  <g transform="translate(960,340)">
    <circle r="80" fill="none" stroke="url(#orange1)" stroke-width="6"/>
    <circle r="50" fill="url(#orange1)" opacity="0.2"/>
    <text y="20" text-anchor="middle" font-size="56" fill="#F59E0B">🍽</text>
  </g>
  <!-- Brand -->
  <text x="960" y="540" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-size="180" font-weight="900" fill="url(#orange1)" letter-spacing="20">BINTORO</text>
  <text x="960" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#aaa" letter-spacing="12">SELF ORDER KIOSK</text>
  <!-- CTA -->
  <text x="960" y="780" text-anchor="middle" font-family="Impact, sans-serif" font-size="64" fill="#fff" letter-spacing="8">👆 SENTUH UNTUK MULAI</text>
  <text x="960" y="850" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#888">Pesan cepat · Bayar mudah · Loyalty poin otomatis</text>
</svg>
